spring:
  application:
    name: pet-diet

  datasource:
    url: ${SUPABASE_DB_URL}
    username: ${SUPABASE_DB_USERNAME}
    password: ${SUPABASE_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

server:
  port: ${SERVER_PORT:8080}

# JWT 설정
jwt:
  secret: ${JWT_SECRET}
  access-expiration: ${JWT_ACCESS_EXPIRATION_MS:3600000}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION_MS:604800000}

# Supabase 설정
supabase:
  url: ${SUPABASE_URL}
  anon-key: ${SUPABASE_ANON_KEY}
  service-role-key: ${SUPABASE_SERVICE_ROLE_KEY}
  jwt-secret: ${SUPABASE_JWT_SECRET}
  storage:
    bucket-recipe: recipe-images
    bucket-meal: meal-images

# OpenAI 설정 (LLM 상담 서비스용)
openai:
  api-key: ${OPENAI_API_KEY}
  base-url: https://api.openai.com
  model: gpt-4o
  max-tokens: 2048

# fal.ai 설정 (이미지 생성용)
fal:
  api-key: ${FAL_API_KEY}
  recipe-image-model: fal-ai/flux-pro/v1.1
  character-image-model: fal-ai/flux/dev/image-to-image

# Resend 설정
resend:
  api-key: ${RESEND_API_KEY}

# 앱 기본 URL
app:
  base-url: ${APP_BASE_URL:http://localhost:8080}

# Dog/Cat Breed API 설정
breed:
  dog-api-key: ${DOG_API_KEY}
  cat-api-key: ${CAT_API_KEY}

# Spoonacular 설정
spoonacular:
  api-key: ${SPOONACULAR_API_KEY}
  base-url: https://api.spoonacular.com

logging:
  level:
    root: INFO
    com.petdiet: DEBUG
